<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>俄罗斯方块</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: sans-serif;
}
canvas {
    background: #111;
    margin-top: 10px;
}
button {
    margin-top: 10px;
    padding: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>🎮 俄罗斯方块</h2>

<button onclick="toggleMusic()">🎵 音乐开关</button>

<canvas id="game" width="300" height="600"></canvas>

<audio id="bgm" loop>
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("bgm");

function toggleMusic() {
    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}

// 自动播放（用户首次点击页面后生效）
document.body.addEventListener("click", () => {
    audio.play().catch(()=>{});
}, { once: true });

// ====== 简单俄罗斯方块核心 ======
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 30;
const cols = 10;
const rows = 20;

let board = Array.from({length: rows}, () => Array(cols).fill(0));

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            if(board[y][x]){
                ctx.fillStyle="cyan";
                ctx.fillRect(x*grid,y*grid,grid-1,grid-1);
            }
        }
    }
}

function drop() {
    board[Math.floor(Math.random()*rows)][Math.floor(Math.random()*cols)] = 1;
    draw();
}

setInterval(drop,500);

draw();
</script>

</body>
</html>
