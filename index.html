<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我的游戏</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
    text-align: center;
    font-family: Arial;
}

#game {
    width: 200px;
    height: 200px;
    background: red;
    position: relative;
    margin: auto;
}

#player {
    width: 50px;
    height: 50px;
    background: blue;
    position: absolute;
    left: 75px;
    top: 75px;
}

button {
    margin: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<h2>小游戏</h2>

<div id="game">
    <div id="player"></div>
</div>

<!-- 控制按钮 -->
<div>
    <button onclick="moveLeft()">⬅</button>
    <button onclick="moveRight()">➡</button>
    <button onclick="moveUp()">⬆</button>
    <button onclick="moveDown()">⬇</button>
</div>

<script>
let x = 75;
let y = 75;

function update() {
    const player = document.getElementById("player");
    player.style.left = x + "px";
    player.style.top = y + "px";
}

function moveLeft() { x -= 10; update(); }
function moveRight() { x += 10; update(); }
function moveUp() { y -= 10; update(); }
function moveDown() { y += 10; update(); }

// ✅ 注册 Service Worker（正确方式）
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
