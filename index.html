<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>神级俄罗斯方块</title>

<!-- ✅ PWA关键 -->
<link rel="manifest" href="manifest.json">

<style>
body{
  background:#000;
  color:#fff;
  text-align:center;
}

canvas{
  margin-top:10px;
  box-shadow:0 0 20px cyan;
}

#score,#rank{
  margin-top:10px;
}

button{
  padding:10px;
  margin:5px;
  font-size:16px;
}
</style>

</head>

<body>

<h2>🔥 神级俄罗斯方块 🔥</h2>

<!-- 游戏画布 -->
<canvas id="game" width="300" height="600"></canvas>
<canvas id="next" width="120" height="120"></canvas>

<!-- 分数 -->
<div id="score">🏆 分数: 0</div>
<div id="rank">🥇 排行榜</div>

<!-- 控制按钮 -->
<div>
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="rotate()">🔄</button>
  <button onclick="drop()">⬇️</button>
</div>

<!-- 音效 -->
<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="rot" src="rotate.wav"></audio>

<!-- ⭐ 你的游戏JS（保留） -->
<script src="sw.js"></script> <!-- ❗不是必须，但你之前有 sw.js 文件 -->

<script src="your-game.js"></script> 
<!-- ↑ 如果你之前代码在 sw.js 或别的文件，这里换成你的JS文件 -->

<!-- ✅ Service Worker 注册（必须） -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
